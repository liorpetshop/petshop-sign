<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pet Shop Ra’anana</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  height:100vh;
  font-family:Arial, sans-serif;
  background:linear-gradient(135deg,#ffe600 0%,#ffd000 35%,#d71920 100%);
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}
.card{
  width:92%;
  height:88%;
  background:white;
  border-radius:34px;
  padding:35px;
  text-align:center;
  box-shadow:0 20px 50px rgba(0,0,0,.35);
  border:8px solid #d71920;
}
.logo{
  width:70%;
  max-width:650px;
  margin-bottom:25px;
}
.title{
  font-size:62px;
  font-weight:900;
  color:#d71920;
  margin:10px 0 30px;
}
.row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#f7f7f7;
  border-radius:28px;
  padding:22px 36px;
  margin:18px auto;
  width:86%;
  font-size:42px;
  font-weight:900;
  color:#111;
  border:3px solid #eee;
}
.closed{color:#d71920}
.footer{
  margin-top:35px;
  background:#111;
  color:white;
  border-radius:26px;
  padding:22px;
  font-size:32px;
  font-weight:800;
  display:flex;
  justify-content:space-around;
  gap:15px;
}
.notice{
  margin-top:25px;
  font-size:28px;
  color:#d71920;
  font-weight:bold;
}
</style>

<script>
setInterval(function(){
  window.location.reload();
}, 30000);
</script>
</head>

<body>
<div class="card">

  <img class="logo" src="logo.jpeg" alt="Pet Shop Logo">

  <div class="title">שעות פתיחה</div>

  <div class="row">
    <span>א׳-ה׳</span>
    <span>09:00 - 20:00</span>
  </div>

  <div class="row">
    <span>יום ו׳</span>
    <span>09:00 - 15:00</span>
  </div>

  <div class="row">
    <span>שבת</span>
    <span class="closed">סגור</span>
  </div>

  <div class="footer">
    <span>☎ 09-9743003</span>
    <span>📍 אחוזה 130, רעננה</span>
  </div>

  <div class="notice">חנות שחיות אוהבות 🐾</div>

</div>
</body>
</html>
