<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pet Shop</title>

<style>
body{
  margin:0;
  height:100vh;
  font-family:Arial,sans-serif;
  background:linear-gradient(135deg,#ffe600,#ffcc00,#d71920);
  display:flex;
  justify-content:center;
  align-items:center;
}
.card{
  width:90%;
  max-width:900px;
  background:white;
  border:8px solid #d71920;
  border-radius:35px;
  padding:45px;
  text-align:center;
  box-shadow:0 20px 50px rgba(0,0,0,.35);
}
.logo{
  width:65%;
  max-width:480px;
  margin-bottom:40px;
}
.title{
  font-size:54px;
  font-weight:900;
  color:#d71920;
  margin-bottom:35px;
}
.message{
  font-size:50px;
  font-weight:900;
  line-height:1.6;
  color:#111;
}
.time{
  margin:35px auto;
  background:#d71920;
  color:white;
  border-radius:30px;
  padding:25px;
  font-size:58px;
  font-weight:900;
}
.sorry{
  margin-top:30px;
  font-size:40px;
  color:#d71920;
  font-weight:900;
}
.footer{
  margin-top:35px;
  background:#222;
  color:white;
  border-radius:25px;
  padding:18px;
  font-size:30px;
}
</style>

<script>
setInterval(function(){
  location.reload();
},30000);
</script>
</head>

<body>

<div class="card">

<img class="logo" src="IMG_1307.jpeg">

<div class="title">לקוחות יקרים</div>

<div class="message">
החנות תיפתח היום<br>
בשעה
</div>

<div class="time">
15:00 - 20:00
</div>

<div class="sorry">
עמכם הסליחה
</div>

<div class="footer">
☎ 09-9743003 &nbsp; | &nbsp; 📍 אחוזה 130, רעננה
</div>

</div>

</body>
</html>
