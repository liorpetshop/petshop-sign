<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pet Shop תל אביב</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#ffe600,#ffd000,#d71920);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    width:90%;
    max-width:900px;
    background:white;
    border-radius:35px;
    box-shadow:0 20px 50px rgba(0,0,0,0.3);
    padding:40px;
    text-align:center;
    border:8px solid #d71920;
}

.logo{
    width:65%;
    max-width:450px;
    margin-bottom:20px;
}

.branch{
    font-size:42px;
    color:#d71920;
    font-weight:bold;
    margin-bottom:10px;
}

.title{
    font-size:54px;
    color:#222;
    font-weight:bold;
    margin-bottom:30px;
}

.row{
    background:#f5f5f5;
    border-radius:25px;
    padding:22px;
    margin:18px 0;
    display:flex;
    justify-content:space-between;
    font-size:38px;
    font-weight:bold;
}

.closed{
    color:#d71920;
}

.footer{
    margin-top:30px;
    background:#222;
    color:white;
    border-radius:25px;
    padding:20px;
    font-size:28px;
    line-height:1.7;
}

.notice{
    margin-top:20px;
    color:#d71920;
    font-size:28px;
    font-weight:bold;
}

</style>

<script>
setInterval(function(){
    location.reload();
},30000);
</script>

</head>

<body>

<div class="card">

<img class="logo" src="IMG_1307.jpeg">

<div class="branch">
סניף תל אביב
</div>

<div class="title">
שעות פתיחה
</div>

<div class="row">
<span>א'-ה'</span>
<span>09:00 - 20:00</span>
</div>

<div class="row">
<span>יום ו'</span>
<span>09:00 - 15:00</span>
</div>

<div class="row">
<span>שבת</span>
<span class="closed">סגור</span>
</div>

<div class="footer">
☎ 03-0000000<br>
📍 תל אביב
</div>

<div class="notice">
חנות שחיות אוהבות 🐾
</div>

</div>

</body>
</html>
